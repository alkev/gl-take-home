services:
  vecstore:
    build: .
    image: vecstore:dev
    ports:
      - "8888:8888"
    environment:
      PORT: "8888"
      VECTOR_DIMENSION: "100"
      LOG_LEVEL: "info"
      SNAPSHOT_PATH: "/data/snapshot.bin"
      SNAPSHOT_INTERVAL: "300s"
      INITIAL_CAPACITY: "1300000"
    volumes:
      - snapshot:/data
    restart: unless-stopped
    # Give the service time to drain in-flight HTTP (15s ceiling in main.go)
    # AND write a 520 MB snapshot (a few seconds + fsync). Docker's default
    # stop_grace_period is 10s — SIGKILL arrives mid-snapshot and the .tmp is
    # discarded. 60s covers the worst case comfortably.
    stop_grace_period: 60s

volumes:
  snapshot:
